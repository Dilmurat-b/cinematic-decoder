# ── Streamlit Configuration — Cinematic Decoder ───────────────────────────────

[server]
port = 8501
address = "0.0.0.0"
headless = true          # required inside Docker (no browser auto-open)
enableCORS = false
enableXsrfProtection = true

[browser]
gatherUsageStats = false
serverAddress = "localhost"
serverPort = 8501

[theme]
base = "dark"
primaryColor = "#f0a623"
backgroundColor = "#0d0d0f"
secondaryBackgroundColor = "#12121a"
textColor = "#e8e8f0"
font = "sans serif"
