version: "3.9"

# ── Cinematic Decoder — Docker Compose ────────────────────────────────────────
# Optimised for OrbStack on Apple Silicon (arm64).
# Run with:  docker compose up --build
# Open:      http://localhost:8501

services:
  cinematic-decoder:
    build:
      context: .
      dockerfile: Dockerfile
      # Force arm64 platform — OrbStack/Apple Silicon native
      platforms:
        - linux/arm64
    image: cinematic-decoder:latest
    container_name: cinematic-decoder-app
    platform: linux/arm64
    ports:
      - "8501:8501"
    environment:
      # Streamlit environment hints
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    volumes:
      # Live-reload: mount source so edits reflect without rebuilding
      - ./app.py:/app/app.py:ro
    restart: unless-stopped
    healthcheck:
      test: >
        python -c
        "import urllib.request;
         urllib.request.urlopen('http://localhost:8501/_stcore/health')"
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
